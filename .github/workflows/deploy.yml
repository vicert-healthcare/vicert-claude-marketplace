name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Every day at 6:00 UTC (8:00 CET)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install --ignore-scripts

      - name: Build marketplace.json
        run: node scripts/build-marketplace.js

      - name: Commit marketplace.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet || git commit -m "chore: regenerate marketplace.json [skip ci]" && git push

      - name: Sync Slack posts
        run: node scripts/sync-slack.js
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_NAME: gen-ai

      - name: Commit new posts if any
        run: |
          git add site/src/content/posts/
          git diff --cached --quiet || (git commit -m "chore: sync slack posts [skip ci]" && git push)

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        run: npx astro build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
